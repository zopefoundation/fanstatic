# Generated with zope.meta (https://zopemeta.readthedocs.io/) from:
# https://github.com/zopefoundation/meta/tree/master/src/zope/meta/pure-python
[tox]
minversion = 3.18
envlist =
    release-check
    lint
    py310
    py311
    py312
    py313
    py314
    docs
    coverage

[testenv]
usedevelop = true
package = wheel
wheel_build_env = .pkg
deps =
    setuptools >= 78.1.1,< 81
    pytest-cov
commands =
    uv pip install mypackage --index-url=file://{toxinidir}/src/fanstatic/tests/fixtures/ --extra-index-url=https://pypi.org/simple
    uv pip install -e {toxinidir}/src/fanstatic/tests/fixtures/mydevpackage
    pytest []
extras =
    test
allowlist_externals =
    uv

[testenv:setuptools-latest]
basepython = python3
deps =
    git+https://github.com/pypa/setuptools.git\#egg=setuptools
    pytest-cov

[testenv:release-check]
description = ensure that the distribution is ready to release
basepython = python3
skip_install = true
deps =
    setuptools >= 78.1.1,< 81
    wheel
    twine
    build
    check-manifest
    check-python-versions >= 0.20.0
    wheel
commands_pre =
commands =
    check-manifest
    check-python-versions --only pyproject.toml,setup.py,tox.ini,.github/workflows/tests.yml
    python -m build --sdist --no-isolation
    twine check dist/*

[testenv:lint]
description = This env runs all linters configured in .pre-commit-config.yaml
basepython = python3
skip_install = true
deps =
    pre-commit
commands_pre =
commands =
    pre-commit run --all-files --show-diff-on-failure

[testenv:docs]
basepython = python3
skip_install = false
extras =
    docs
commands_pre =
commands =
    sphinx-build -b html -d docs/_build/doctrees docs docs/_build/html

[testenv:coverage]
basepython = python3
allowlist_externals =
    mkdir
deps =
    coverage[toml]
    pytest-cov
commands =
    mkdir -p {toxinidir}/parts/htmlcov
    pytest --cov=src --cov-report= --cov-config=tox.ini {posargs}
    coverage html
    coverage report
